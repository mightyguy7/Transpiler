<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C to Python Transpiler</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00bbff; }
        .editor-container { display: flex; gap: 10px; height: 65vh; margin-top: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; color: #ccc; }
        textarea, .output-screen { 
            flex: 1; padding: 15px; font-family: 'Consolas', monospace; 
            font-size: 14px; border: 1px solid #333; border-radius: 4px; 
            resize: none; outline: none;
        }
        textarea { background: #252526; color: #d4d4d4; }
        .output-screen { background: #2d2d2d; color: #9cdcfe; overflow-y: auto; white-space: pre-wrap; }
        .controls { text-align: center; margin-top: 20px; }
        button { 
            background: #007acc; color: white; border: none; padding: 12px 30px; 
            font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>
    <h1>C → Python Transpiler</h1>
    <div class="editor-container">
        <div class="box">
            <label>C Source Code</label>
            <textarea id="input" placeholder="int main() { ... }"></textarea>
        </div>
        <div class="box">
            <label>Python Output</label>
            <div id="output" class="output-screen"># Transpiled code will appear here</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="runTranslation()">Convert Code</button>
    </div>

    <script>
        async function runTranslation() {
            const code = document.getElementById('input').value;
            const outputDiv = document.getElementById('output');
            
            if(!code.trim()) return;

            outputDiv.innerText = "Translating...";

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const data = await response.json();
                outputDiv.innerText = data.python_code;
            } catch (err) {
                outputDiv.innerText = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
