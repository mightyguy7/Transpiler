<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C → Python Transpiler</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #faf7f4;
            --bg2:         #f4f0eb;
            --surface:     #ffffff;
            --border:      #e8ddd4;
            --border2:     #d9cec4;
            --lavender:    #c9b8e8;
            --lavender-l:  #ede7f8;
            --lavender-d:  #9a7fd4;
            --sage:        #a8c5a0;
            --sage-l:      #e6f2e4;
            --sage-d:      #6a9e60;
            --peach:       #f0b8a0;
            --peach-l:     #fce8de;
            --peach-d:     #c97a58;
            --rose:        #e8a0b4;
            --sky:         #a0c8e8;
            --butter:      #f0d898;
            --butter-d:    #c8a840;
            --text:        #4a3f38;
            --text2:       #7a6e68;
            --text3:       #a89e98;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 45% at 8%  12%,  rgba(201,184,232,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 45% 55% at 92% 85%,  rgba(168,197,160,0.18) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 80% 10%,  rgba(240,184,160,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 15% 88%,  rgba(160,200,232,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 35% 35% at 50% 50%,  rgba(232,160,180,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(180,160,150,0.16) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1380px;
            margin: 0 auto;
            padding: 26px 32px 40px;
        }

        .deco-strip { display: flex; gap: 6px; margin-bottom: 20px; opacity: 0.65; }
        .deco-strip span { height: 3px; border-radius: 3px; }

        header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1.5px solid var(--border);
        }

        .logo-group { display: flex; align-items: center; gap: 14px; }

        .logo-icon {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--lavender), var(--peach));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(201,184,232,0.45);
            flex-shrink: 0;
        }

        .logo-text { display: flex; flex-direction: column; gap: 3px; }

        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text); line-height: 1;
        }
        .logo-title .arrow { color: var(--lavender-d); margin: 0 6px; font-family: 'DM Sans', sans-serif; }

        .logo-subtitle {
            font-size: 11px; color: var(--text3);
            letter-spacing: 0.14em; text-transform: uppercase;
            font-family: 'DM Mono', monospace; font-weight: 300;
        }

        /* ── Main layout ── */
        .editors-wrapper {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            height: calc(100vh - 220px);
            min-height: 440px;
        }

        .panel {
            display: flex; flex-direction: column;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .panel:focus-within {
            border-color: var(--lavender);
            box-shadow: 0 0 0 3px rgba(201,184,232,0.18), 0 8px 30px rgba(0,0,0,0.05);
        }
        /* Red border on error */
        .panel.has-error {
            border-color: #e8a0a0 !important;
            box-shadow: 0 0 0 3px rgba(232,160,160,0.18) !important;
        }

        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 18px;
            border-bottom: 1.5px solid var(--border);
            flex-shrink: 0;
        }
        .panel-c .panel-header  { background: var(--lavender-l); }
        .panel-py .panel-header { background: var(--sage-l); }
        .panel.has-error .panel-header { background: #fce8e8 !important; border-bottom-color: #e8a0a0 !important; }

        .panel-lang { display: flex; align-items: center; gap: 10px; }

        .lang-pill {
            font-family: 'DM Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.1em;
            padding: 3px 11px; border-radius: 20px;
        }
        .panel-c  .lang-pill { background: var(--lavender); color: #5c3d99; }
        .panel-py .lang-pill { background: var(--sage);     color: #2d5e27; }
        .panel.has-error .lang-pill { background: #e8a0a0 !important; color: #7a2020 !important; }

        .lang-name { font-size: 13px; font-weight: 500; color: var(--text2); }

        .panel-actions { display: flex; gap: 7px; }

        .action-btn {
            font-family: 'DM Mono', monospace; font-size: 11px;
            padding: 5px 13px; border-radius: 20px;
            border: 1.5px solid var(--border2);
            background: var(--surface); color: var(--text2);
            cursor: pointer; transition: all 0.2s;
        }
        .action-btn:hover { background: var(--lavender-l); border-color: var(--lavender); color: var(--lavender-d); }
        .panel-py .action-btn:hover { background: var(--sage-l); border-color: var(--sage); color: var(--sage-d); }

        .editor-area { flex: 1; position: relative; overflow: hidden; }

        .line-numbers {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 42px; background: var(--bg2);
            border-right: 1.5px solid var(--border);
            padding: 16px 8px 16px 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: flex-end;
            user-select: none; pointer-events: none;
        }
        .line-numbers span {
            font-family: 'DM Mono', monospace;
            font-size: 11px; font-weight: 300;
            color: var(--text3); line-height: 20px;
        }

        textarea {
            position: absolute; inset: 0;
            padding: 16px 16px 16px 54px;
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-weight: 300; line-height: 20px;
            background: transparent; color: var(--text);
            border: none; outline: none; resize: none;
            tab-size: 4; caret-color: var(--lavender-d);
            width: 100%; height: 100%;
        }
        textarea::placeholder { color: var(--text3); }
        textarea::-webkit-scrollbar { width: 5px; }
        textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .output-area {
            position: absolute; inset: 0;
            padding: 16px 16px 16px 54px;
            font-family: 'DM Mono', monospace;
            font-size: 13px; font-weight: 300; line-height: 20px;
            color: var(--sage-d);
            overflow-y: auto; white-space: pre; overflow-x: auto;
        }
        .output-area::-webkit-scrollbar { width: 5px; height: 5px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .output-placeholder { color: var(--text3); font-style: italic; }

        /* ── Error box inside output panel ── */
        .error-box {
            display: none;
            margin: 14px 14px 0 54px;
            padding: 12px 16px;
            background: #fff0f0;
            border: 1.5px solid #e8a0a0;
            border-radius: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 12px; font-weight: 300;
            color: #a03030;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .error-box.visible { display: block; }

        .error-box-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 500;
            color: #c04040; margin-bottom: 6px;
        }
        .error-icon {
            width: 18px; height: 18px; border-radius: 50%;
            background: #e8a0a0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #7a2020; flex-shrink: 0;
        }
        .error-message { color: #a03030; font-size: 12px; }

        /* When error box is shown, shrink the output text area */
        .output-area.with-error {
            bottom: auto;
            height: 0;
            overflow: hidden;
            padding: 0;
        }

        /* ── Middle ── */
        .middle-col {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; padding: 0 22px;
        }

        .divider-line {
            width: 1.5px; flex: 1; max-height: 90px;
            background: linear-gradient(to bottom, transparent, var(--border), transparent);
        }

        .convert-btn {
            background: linear-gradient(145deg, var(--lavender), var(--peach));
            border: none; border-radius: 50px;
            padding: 14px 22px; color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(201,184,232,0.5);
            white-space: nowrap;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .convert-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px rgba(201,184,232,0.65); }
        .convert-btn:active { transform: translateY(0) scale(0.97); }
        .convert-btn .btn-arrow { font-size: 20px; line-height: 1; }
        .convert-btn .btn-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.9; }
        .convert-btn.loading { opacity: 0.75; pointer-events: none; }
        .convert-btn.loading .btn-arrow { animation: spin 0.9s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ── Status Bar ── */
        .status-bar {
            display: flex; align-items: center;
            margin-top: 14px; padding: 10px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-family: 'DM Mono', monospace;
            font-size: 11px; font-weight: 300;
            color: var(--text3); gap: 18px;
        }
        .status-item { display: flex; align-items: center; gap: 7px; }

        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--border2); transition: all 0.3s;
        }
        .status-dot.ok     { background: var(--sage);     box-shadow: 0 0 6px rgba(168,197,160,0.7); }
        .status-dot.err    { background: #e08080;         box-shadow: 0 0 6px rgba(224,128,128,0.7); }
        .status-dot.active { background: var(--lavender); box-shadow: 0 0 6px rgba(201,184,232,0.7); }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--surface);
            border: 1.5px solid var(--lavender);
            border-radius: 12px; padding: 11px 22px;
            font-family: 'DM Mono', monospace;
            font-size: 12px; color: var(--lavender-d);
            opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(201,184,232,0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error-toast {
            border-color: #e8a0a0; color: #c04040;
            box-shadow: 0 4px 20px rgba(232,160,160,0.3);
        }

        @media (max-width: 900px) {
            .editors-wrapper { grid-template-columns: 1fr; grid-template-rows: 1fr auto 1fr; height: auto; }
            .panel { height: 300px; }
            .middle-col { flex-direction: row; padding: 14px 0; }
            .divider-line { width: 70px; height: 1.5px; max-height: none; background: linear-gradient(to right, transparent, var(--border), transparent); }
            .convert-btn { flex-direction: row; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="deco-strip">
        <span style="width:32px; background:var(--lavender);"></span>
        <span style="width:20px; background:var(--rose);"></span>
        <span style="width:48px; background:var(--peach);"></span>
        <span style="width:24px; background:var(--butter);"></span>
        <span style="width:36px; background:var(--sage);"></span>
        <span style="width:20px; background:var(--sky);"></span>
        <span style="width:28px; background:var(--lavender);"></span>
    </div>

    <header>
        <div class="logo-group">
            <div class="logo-icon">✦</div>
            <div class="logo-text">
                <div class="logo-title">C<span class="arrow">→</span>Python</div>
                <div class="logo-subtitle">Source Transpiler</div>
            </div>
        </div>
    </header>

    <div class="editors-wrapper">

        <!-- C Panel -->
        <div class="panel panel-c" id="panelC">
            <div class="panel-header">
                <div class="panel-lang">
                    <span class="lang-pill">C</span>
                    <span class="lang-name">Source Code</span>
                </div>
                <div class="panel-actions">
                    <button class="action-btn" onclick="clearInput()">Clear</button>
                    <button class="action-btn" onclick="loadSample()">Sample ✦</button>
                </div>
            </div>
            <div class="editor-area">
                <div class="line-numbers" id="lineNumbers"></div>
                <textarea
                    id="input"
                    placeholder="// paste your C code here..."
                    oninput="updateLineNumbers(); updateStats()"
                    onscroll="syncLineNumbers()"
                    onkeydown="handleTab(event)"
                    spellcheck="false"
                ></textarea>
            </div>
        </div>

        <!-- Middle -->
        <div class="middle-col">
            <div class="divider-line"></div>
            <button class="convert-btn" onclick="runTranslation()" id="convertBtn">
                <span class="btn-arrow">→</span>
                <span class="btn-label">Convert</span>
            </button>
            <div class="divider-line"></div>
        </div>

        <!-- Python Panel -->
        <div class="panel panel-py" id="panelPy">
            <div class="panel-header">
                <div class="panel-lang">
                    <span class="lang-pill" id="pyLangPill">PY</span>
                    <span class="lang-name" id="pyLangName">Python Output</span>
                </div>
                <div class="panel-actions">
                    <button class="action-btn" onclick="copyOutput()">Copy ✦</button>
                </div>
            </div>
            <div class="editor-area" id="pyEditorArea">
                <div class="line-numbers" id="outLineNumbers"></div>
                <div class="output-area" id="output">
                    <span class="output-placeholder"># transpiled python will appear here...</span>
                </div>
                <!-- Error box shown when translation fails -->
                <div class="error-box" id="errorBox">
                    <div class="error-box-title">
                        <div class="error-icon">✕</div>
                        <span>Translation Error</span>
                    </div>
                    <div class="error-message" id="errorMessage"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">ready</span>
        </div>
        <div class="status-item"><span id="lineCount">0 lines</span></div>
        <div class="status-item"><span id="charCount">0 chars</span></div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    function updateLineNumbers() {
        const ta = document.getElementById('input');
        const ln = document.getElementById('lineNumbers');
        const n  = ta.value.split('\n').length;
        ln.innerHTML = Array.from({length: n}, (_, i) => `<span>${i+1}</span>`).join('');
    }

    function syncLineNumbers() {
        document.getElementById('lineNumbers').scrollTop =
            document.getElementById('input').scrollTop;
    }

    function updateOutputLineNumbers(text) {
        const ln = document.getElementById('outLineNumbers');
        const n  = text ? text.split('\n').length : 1;
        ln.innerHTML = Array.from({length: n}, (_, i) => `<span>${i+1}</span>`).join('');
    }

    function updateStats() {
        const v = document.getElementById('input').value;
        document.getElementById('lineCount').textContent = v ? v.split('\n').length + ' lines' : '0 lines';
        document.getElementById('charCount').textContent = v.length + ' chars';
    }

    function handleTab(e) {
        if (e.key !== 'Tab') return;
        e.preventDefault();
        const ta = e.target, s = ta.selectionStart;
        ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = s + 4;
        updateLineNumbers();
    }

    function showError(msg) {
        const panel    = document.getElementById('panelPy');
        const output   = document.getElementById('output');
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMessage');
        const pill     = document.getElementById('pyLangPill');
        const name     = document.getElementById('pyLangName');

        // clean up the message — strip "Error during translation: " prefix if present
        const clean = msg.replace(/^Error during translation:\s*/i, '').trim();

        panel.classList.add('has-error');
        output.classList.add('with-error');
        output.innerHTML = '';
        errorBox.classList.add('visible');
        errorMsg.textContent = clean;
        pill.textContent = '✕';
        name.textContent = 'Error';

        updateOutputLineNumbers('');
        setStatus('err', 'error — check output');
    }

    function clearError() {
        const panel    = document.getElementById('panelPy');
        const output   = document.getElementById('output');
        const errorBox = document.getElementById('errorBox');
        const pill     = document.getElementById('pyLangPill');
        const name     = document.getElementById('pyLangName');

        panel.classList.remove('has-error');
        output.classList.remove('with-error');
        errorBox.classList.remove('visible');
        pill.textContent = 'PY';
        name.textContent = 'Python Output';
    }

    function clearInput() {
        document.getElementById('input').value = '';
        clearError();
        document.getElementById('output').innerHTML =
            '<span class="output-placeholder"># transpiled python will appear here...</span>';
        updateLineNumbers(); updateStats(); updateOutputLineNumbers('');
        setStatus('idle', 'ready');
    }

    function loadSample() {
        document.getElementById('input').value =
`#include <stdio.h>

int factorial(int n) {
    if (n == 0) {
        return 1;
    }
    return n * factorial(n - 1);
}

int main() {
    int num;
    scanf("%d", &num);
    int result = factorial(num);
    printf("Factorial of %d is %d\\n", num, result);
    return 0;
}`;
        updateLineNumbers(); updateStats();
    }

    async function copyOutput() {
        const out = document.getElementById('output').innerText;
        if (!out || out.includes('transpiled python')) return;
        await navigator.clipboard.writeText(out);
        showToast('✦ copied to clipboard', false);
    }

    function setStatus(state, msg) {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.className = 'status-dot';
        if      (state === 'ok')   dot.classList.add('ok');
        else if (state === 'err')  dot.classList.add('err');
        else if (state === 'busy') dot.classList.add('active');
        text.textContent = msg || 'ready';
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (isError ? ' error-toast' : '');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function runTranslation() {
        const code = document.getElementById('input').value;
        const out  = document.getElementById('output');
        const btn  = document.getElementById('convertBtn');

        if (!code.trim()) { showToast('✦ paste some C code first!', false); return; }

        clearError();
        btn.classList.add('loading');
        btn.querySelector('.btn-arrow').textContent = '↻';
        setStatus('busy', 'translating...');
        out.innerHTML = '<span class="output-placeholder">translating...</span>';

        try {
            const res    = await fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const data   = await res.json();
            const result = data.python_code;

            if (result.startsWith('Error')) {
                showError(result);
                showToast('✕ translation failed', true);
            } else {
                out.textContent = result;
                setStatus('ok', 'done ✦');
                updateOutputLineNumbers(result);
                showToast('✦ converted successfully', false);
            }
        } catch (e) {
            showError('Could not connect to the Flask server.\nMake sure app.py is running on localhost:5000');
            showToast('✕ connection failed', true);
        } finally {
            btn.classList.remove('loading');
            btn.querySelector('.btn-arrow').textContent = '→';
        }
    }

    updateLineNumbers();
    updateStats();
</script>
</body>
</html>
